appId: com.ilumi.calculator
productName: Ilumi
copyright: "© 2026 Ilumi. All rights reserved."

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - resources/**/*
  - plugins/CommunityPlugins/**/*
  - "!**/*.{ts,tsx,map}"
  - "!**/node_modules/**/{test,tests,__tests__}/**"

extraResources:
  - from: plugins/CommunityPlugins
    to: plugins/CommunityPlugins
    filter:
      - "**/*.js"
      - "**/README*"

# --- macOS ---
mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  artifactName: "${productName}-${version}-${arch}.dmg"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# --- Windows ---
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  artifactName: "${productName}-Setup-${version}-${arch}.exe"
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico

# --- Linux ---
linux:
  icon: resources/icon-512.png
  category: Utility
  target:
    - target: deb
      arch:
        - x64
        - arm64
    - target: AppImage
      arch:
        - x64
        - arm64

deb:
  artifactName: "${productName}_${version}_${arch}.deb"
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils

appImage:
  artifactName: "${productName}-${version}-${arch}.AppImage"

publish: null
